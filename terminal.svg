<svg width="620" height="280" viewBox="0 0 620 280" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', Courier, monospace">
  <defs>
    <style>
      .bg { fill: #0d0221; }
      .border { fill: none; stroke: #00ff88; stroke-width: 1.5; }
      .title { fill: #ffffff; font-size: 12px; font-weight: bold; }
      .divider { fill: none; stroke: #00ff88; stroke-width: 1; }
      .key { fill: #00bfff; font-size: 11.5px; }
      .val { fill: #ffffff; font-size: 11.5px; }
      .bar-fill { fill: #00ff88; }
      .bar-empty { fill: #1a1a3e; }
      .cursor { fill: #00ff88; animation: blink 1s step-end infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

      /* Line reveal animations */
      .line1 { opacity: 0; animation: show 0.1s 0.3s forwards; }
      .line2 { opacity: 0; animation: show 0.1s 0.7s forwards; }
      .line3 { opacity: 0; animation: show 0.1s 1.1s forwards; }
      .line4 { opacity: 0; animation: show 0.1s 1.5s forwards; }
      .line5 { opacity: 0; animation: show 0.1s 1.9s forwards; }
      .line6 { opacity: 0; animation: show 0.1s 2.3s forwards; }
      .line7 { opacity: 0; animation: show 0.1s 2.7s forwards; }
      .line8 { opacity: 0; animation: show 0.1s 3.1s forwards; }
      .line9 { opacity: 0; animation: show 0.1s 3.5s forwards; }
      @keyframes show { to { opacity: 1; } }

      /* Status bar animation */
      .bar1 { opacity: 0; animation: show 0.05s 1.95s forwards; }
      .bar2 { opacity: 0; animation: show 0.05s 2.05s forwards; }
      .bar3 { opacity: 0; animation: show 0.05s 2.15s forwards; }
      .bar4 { opacity: 0; animation: show 0.05s 2.25s forwards; }
      .bar5 { opacity: 0; animation: show 0.05s 2.35s forwards; }
      .bar6 { opacity: 0; animation: show 0.05s 2.45s forwards; }
      .bar7 { opacity: 0; animation: show 0.05s 2.55s forwards; }
      .bar8 { opacity: 0; animation: show 0.05s 2.65s forwards; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="620" height="280" rx="8" class="bg"/>

  <!-- Outer border box -->
  <rect x="10" y="10" width="600" height="260" rx="4" class="border"/>

  <!-- Top divider line -->
  <line x1="10" y1="40" x2="610" y2="40" class="divider" stroke="#00ff88" stroke-width="1"/>

  <!-- Corner connectors (╠ ╣ style) -->
  <text x="10" y="44" fill="#00ff88" font-size="13" font-family="'Courier New', Courier, monospace">╠</text>
  <text x="600" y="44" fill="#00ff88" font-size="13" font-family="'Courier New', Courier, monospace">╣</text>

  <!-- Title bar -->
  <text x="310" y="30" text-anchor="middle" class="title" fill="#00ff88" font-size="12">
    ⣿  SYSTEM BOOT — USER PROFILE  ⣿
  </text>

  <!-- Dot indicators (traffic lights style) -->
  <circle cx="28" cy="25" r="5" fill="#ff5f57"/>
  <circle cx="45" cy="25" r="5" fill="#febc2e"/>
  <circle cx="62" cy="25" r="5" fill="#28c840"/>

  <!-- === CONTENT LINES === -->

  <!-- Line 1: Name -->
  <g class="line1">
    <text x="30" y="68" class="key">▸  Name</text>
    <text x="140" y="68" fill="#00ff88" font-size="11.5">:</text>
    <text x="160" y="68" class="val">Jainam Shah</text>
  </g>

  <!-- Line 2: Role -->
  <g class="line2">
    <text x="30" y="92" class="key">▸  Role</text>
    <text x="140" y="92" fill="#00ff88" font-size="11.5">:</text>
    <text x="160" y="92" class="val">Computer Engineering Student</text>
  </g>

  <!-- Line 3: OS -->
  <g class="line3">
    <text x="30" y="116" class="key">▸  OS</text>
    <text x="140" y="116" fill="#00ff88" font-size="11.5">:</text>
    <text x="160" y="116" class="val">Brain v22 — caffeine-powered ☕</text>
  </g>

  <!-- Line 4: Location -->
  <g class="line4">
    <text x="30" y="140" class="key">▸  Location</text>
    <text x="140" y="140" fill="#00ff88" font-size="11.5">:</text>
    <text x="160" y="140" class="val">India 🇮🇳</text>
  </g>

  <!-- Line 5: Status with animated bar -->
  <g class="line5">
    <text x="30" y="164" class="key">▸  Status</text>
    <text x="140" y="164" fill="#00ff88" font-size="11.5">:</text>
    <text x="160" y="164" class="val">[ </text>
    <!-- Animated bar blocks -->
    <text x="183" y="164" fill="#00ff88" font-size="11.5" class="bar1">█</text>
    <text x="196" y="164" fill="#00ff88" font-size="11.5" class="bar2">█</text>
    <text x="209" y="164" fill="#00ff88" font-size="11.5" class="bar3">█</text>
    <text x="222" y="164" fill="#00ff88" font-size="11.5" class="bar4">█</text>
    <text x="235" y="164" fill="#00ff88" font-size="11.5" class="bar5">█</text>
    <text x="248" y="164" fill="#00ff88" font-size="11.5" class="bar6">█</text>
    <text x="261" y="164" fill="#00ff88" font-size="11.5" class="bar7">█</text>
    <text x="274" y="164" fill="#00ff88" font-size="11.5" class="bar8">█</text>
    <text x="287" y="164" fill="#1a1a3e" font-size="11.5">██</text>
    <text x="313" y="164" class="val"> ] Building something new...</text>
  </g>

  <!-- Line 6: Interests -->
  <g class="line6">
    <text x="30" y="188" class="key">▸  Interests</text>
    <text x="140" y="188" fill="#00ff88" font-size="11.5">:</text>
    <text x="160" y="188" class="val">web-dev · app-dev · backend · IoT</text>
  </g>

  <!-- Line 7: Uptime -->
  <g class="line7">
    <text x="30" y="212" class="key">▸  Uptime</text>
    <text x="140" y="212" fill="#00ff88" font-size="11.5">:</text>
    <text x="160" y="212" class="val">Still going strong 🔥</text>
  </g>

  <!-- Line 8: Open Source -->
  <g class="line8">
    <text x="30" y="236" class="key">▸  OpenSrc</text>
    <text x="140" y="236" fill="#00ff88" font-size="11.5">:</text>
    <text x="160" y="236" class="val">Actively building &amp; contributing</text>
  </g>

  <!-- Blinking cursor at end -->
  <g class="line9">
    <text x="30" y="256" fill="#00ff88" font-size="11.5">$</text>
    <rect x="44" y="244" width="8" height="13" class="cursor"/>
  </g>

</svg>
